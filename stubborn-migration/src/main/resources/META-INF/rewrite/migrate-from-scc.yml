---
type: specs.openrewrite.org/v1beta/recipe
name: sh.stubborn.contract.migration.MigrateFromSpringCloudContract
displayName: Migrate from Spring Cloud Contract to Stubborn Contract
description: >-
  Composite recipe that updates Maven/Gradle coordinates, Java package names, and
  drops JUnit 4 StubRunner / Verifier usage. Run this after adding stubborn-migration
  to your build's rewrite plugin configuration.
tags:
  - spring-cloud-contract
  - stubborn-contract
  - migration
recipeList:
  - sh.stubborn.contract.migration.UpdateMavenDependencies
  - sh.stubborn.contract.migration.RenameJavaPackages
  - sh.stubborn.contract.migration.DropJUnit4Support

---
type: specs.openrewrite.org/v1beta/recipe
name: sh.stubborn.contract.migration.UpdateMavenDependencies
displayName: Update Spring Cloud Contract Maven coordinates to Stubborn Contract
description: >-
  Replaces org.springframework.cloud:spring-cloud-contract-* GAVs with
  sh.stubborn:stubborn-* equivalents and updates the Maven plugin and BOM.
tags:
  - spring-cloud-contract
  - stubborn-contract
recipeList:
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-verifier
      newGroupId: sh.stubborn
      newArtifactId: stubborn-verifier
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-stub-runner
      newGroupId: sh.stubborn
      newArtifactId: stubborn-stub-runner
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-starter-contract-verifier
      newGroupId: sh.stubborn
      newArtifactId: stubborn-starter-verifier
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-starter-contract-stub-runner
      newGroupId: sh.stubborn
      newArtifactId: stubborn-starter-stub-runner
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-wiremock
      newGroupId: sh.stubborn
      newArtifactId: stubborn-wiremock
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-spec-java
      newGroupId: sh.stubborn
      newArtifactId: stubborn-spec-java
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-spec-groovy
      newGroupId: sh.stubborn
      newArtifactId: stubborn-spec-groovy
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-spec-kotlin
      newGroupId: sh.stubborn
      newArtifactId: stubborn-spec-kotlin
  - org.openrewrite.maven.ChangeManagedDependencyGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-dependencies
      newGroupId: sh.stubborn
      newArtifactId: stubborn-contract-dependencies
  - org.openrewrite.maven.ChangePluginGroupIdAndArtifactId:
      oldGroupId: org.springframework.cloud
      oldArtifactId: spring-cloud-contract-maven-plugin
      newGroupId: sh.stubborn
      newArtifactId: stubborn-contract-maven-plugin

---
type: specs.openrewrite.org/v1beta/recipe
name: sh.stubborn.contract.migration.RenameJavaPackages
displayName: Rename org.springframework.cloud.contract packages to sh.stubborn.contract
description: >-
  Recursively rewrites all Java import statements from
  org.springframework.cloud.contract.* to sh.stubborn.contract.*.
tags:
  - spring-cloud-contract
  - stubborn-contract
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.cloud.contract
      newPackageName: sh.stubborn.contract
      recursive: true

---
type: specs.openrewrite.org/v1beta/recipe
name: sh.stubborn.contract.migration.DropJUnit4Support
displayName: Migrate StubRunner JUnit 4 Rule to JUnit 5 Extension
description: >-
  Replaces @Rule StubRunnerRule / StubRunnerClassRule with
  @RegisterExtension StubRunnerExtension (JUnit 5). Requires JUnit 5 on the
  test classpath.
tags:
  - junit4
  - junit5
  - stubborn-contract
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: sh.stubborn.contract.stubrunner.junit.StubRunnerRule
      newFullyQualifiedTypeName: sh.stubborn.contract.stubrunner.junit5.StubRunnerExtension
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: sh.stubborn.contract.stubrunner.junit.StubRunnerClassRule
      newFullyQualifiedTypeName: sh.stubborn.contract.stubrunner.junit5.StubRunnerExtension
