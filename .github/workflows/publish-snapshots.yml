name: Publish Snapshots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Verify version is SNAPSHOT
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          if [[ ! "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Version $VERSION is not a SNAPSHOT — skipping snapshot publish"
            exit 1
          fi
          echo "Publishing snapshot: $VERSION"

      - name: Build stubborn-build parent
        run: ./mvnw install -f stubborn-build/pom.xml -DskipTests --no-transfer-progress

      - name: Install BOM (stubborn-contract-dependencies)
        run: |
          find ~/.m2/repository/sh/stubborn -name "*.lastUpdated" -delete 2>/dev/null || true
          ./mvnw install -N -f stubborn-contract-dependencies/pom.xml -DskipTests --no-transfer-progress

      - name: Build & test
        run: ./mvnw clean install --no-transfer-progress

  publish:
    name: Publish Snapshots to Maven Central
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Build stubborn-build parent
        run: ./mvnw install -f stubborn-build/pom.xml -DskipTests --no-transfer-progress

      - name: Install BOM (stubborn-contract-dependencies)
        run: |
          find ~/.m2/repository/sh/stubborn -name "*.lastUpdated" -delete 2>/dev/null || true
          ./mvnw install -N -f stubborn-contract-dependencies/pom.xml -DskipTests --no-transfer-progress

      - name: Build & install (skip tests — already tested in test job)
        run: ./mvnw clean install -DskipTests --no-transfer-progress

      - name: Deploy stubborn-build to Maven Central
        run: ./mvnw deploy -Ppublish -DskipTests --no-transfer-progress -f stubborn-build/pom.xml
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

      - name: Deploy all modules to Maven Central
        run: ./mvnw deploy -Ppublish -DskipTests --no-transfer-progress
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
