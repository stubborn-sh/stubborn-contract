name: Stubborn Contract CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build stubborn-build parent
        run: ./mvnw install -f stubborn-build/pom.xml -DskipTests --no-transfer-progress

      - name: Build & install (skip tests)
        run: ./mvnw clean install -DskipTests --no-transfer-progress

      - name: Run tests
        run: ./mvnw test --no-transfer-progress
        continue-on-error: true

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
