name: Deploy Docs

on:
  push:
    branches: [ main ]
    tags: '**'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-and-trigger:
    name: Build & Trigger Unified Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build docs
        run: npm run docs:build

      - name: Check for 404s
        run: bash scripts/check-docs-links.sh
        # Uses python3 -m http.server — no extra deps needed

      - name: Trigger unified docs build in stubborn broker repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          repository: stubborn-sh/stubborn
          event-type: contract-docs-updated
