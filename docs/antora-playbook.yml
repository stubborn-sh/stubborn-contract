antora:
  extensions:
    - require: '@springio/antora-extensions'
      root_component_name: 'stubborn-contract'
site:
  title: Stubborn Contract
  url: https://stubborn-sh.github.io/stubborn-contract/
content:
  sources:
    - url: ./..
      branches: HEAD
      start_path: docs
      worktrees: true
asciidoc:
  attributes:
    page-stackoverflow-url: https://stackoverflow.com/tags/stubborn-contract
    page-pagination: ''
    hide-uri-scheme: '@'
    tabs-sync-option: '@'
    chomp: 'all'
    kroki-fetch-diagram: true
  extensions:
    - '@asciidoctor/tabs'
    - '@springio/asciidoctor-extensions'
    - 'asciidoctor-kroki'
  sourcemap: true
urls:
  latest_version_segment: ''
runtime:
  log:
    failure_level: warn
    format: pretty
ui:
  bundle:
    url: https://github.com/spring-io/antora-ui-spring/releases/download/v0.4.15/ui-bundle.zip
